# ============================================================
# CentralStore - RabbitMQ 3.13 konfigurace
# ============================================================

# --- General ---
# Defaultni vhost a user se nastavuji pres env vars

# --- Management plugin ---
management.load_definitions = /etc/rabbitmq/definitions.json

# --- Networking ---
listeners.tcp.default = 5672
management.tcp.port = 15672

# --- Memory ---
# Alarm pri 60% dostupne pameti
vm_memory_high_watermark.relative = 0.6
vm_memory_high_watermark_paging_ratio = 0.8

# --- Disk ---
# Alarm pri < 1GB volneho mista
disk_free_limit.absolute = 1GB

# --- Logging ---
log.file.level = info
log.console = true
log.console.level = warning

# --- Heartbeat ---
heartbeat = 60

# --- Queue settings ---
# Lazy queues (ukladaji zpravy na disk, setri RAM)
queue_master_locator = min-masters
